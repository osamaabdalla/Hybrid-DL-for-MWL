# Full 48-subject LOSO (long runtime). Set use_ica: true to match manuscript Methods.

project:
  seed: 42

paths:
  raw_data_dir: data/STEW
  output_dir: outputs
  interim_data_dir: data/STEW/interim
  processed_data_dir: data/STEW/processed

cache:
  preprocessed: true
  sequences: true

dataset:
  strict_signal_audit: true
  verify_stew_conventions: true
  min_recording_samples: 0

preprocessing:
  bandpass_low: 1.0
  bandpass_high: 40.0
  notch_freq: 50
  use_ica: true
  reference_mode: none
  cz_proxy_reference: true

features:
  method: welch
  epoch_seconds: 2.0
  window_length_sec: 10
  sequence_steps: 10

vae:
  latent_dim: 128
  epochs: 20
  val_fraction: 0.1

cbam:
  enabled: true
  reduction_ratio: 8
  spatial_kernel_size: 7
  attention_order: channel_spatial

training:
  epochs: 35
  batch_size: 32
  learning_rate: 0.001
  lr_schedule: exponential
  early_stopping_monitor: val_macro_f1
  early_stopping_patience: 10

reproducibility:
  loso_subjects_limit: null
  quick_mode: false
  run_sensitivity: true
  strict_subject_count: true
  expected_n_subjects: 48
