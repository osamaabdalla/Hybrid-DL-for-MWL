project:
  name: Hybrid-DL-for-MWL
  seed: 42

paths:
  raw_data_dir: data/STEW
  output_dir: outputs

dataset:
  sfreq: 128

preprocessing:
  bandpass_low: 1.0
  bandpass_high: 40.0
  notch_freq: 50
  use_ica: false
  cz_proxy_reference: true

features:
  method: welch
  image_height: 80
  image_width: 60
  window_length_sec: 10
  sequence_steps: 10

vae:
  latent_dim: 128
  epochs: 5

cbam:
  enabled: true
  reduction_ratio: 8
  spatial_kernel_size: 7

model:
  blstm_units: 20
  dropout: 0.3

training:
  epochs: 5
  batch_size: 8
  learning_rate: 0.001

reproducibility:
  loso_subjects_limit: 2
  quick_mode: true
  run_sensitivity: false
  strict_subject_count: false
